<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesap Kimde? | Masada Hesabı Kim Ödeyecek? Tek Tıkla Karar Ver!</title>

    <meta name="description" content="Arkadaş grubunla hesabı kimin ödeyeceğine saniyeler içinde karar ver.">
    <link rel="stylesheet" href="style.css?v=1.1">
    <link rel="stylesheet" href="corporate.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <script src="translations.js"></script>
    <script src="preferences.js"></script>
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header class="main-header" id="navbar">
        <div class="logo-text">
            <h2 style="font-weight: 800;">Hesap<span class="highlight">Kimde?</span></h2>
        </div>
        <nav class="nav-links">
            <a href="#hakkimizda">Kurumsal</a>
            <a href="#cozumler">Çözümler</a>
            <a href="#partnerler">İş Ortaklığı</a>
            <a href="#iletisim">İletişim</a>
        </nav>
        <div class="pref-controls">
            <button class="theme-toggle" onclick="handleThemeToggle()"><span id="theme-icon">☀️</span></button>
            <div class="custom-dropdown" id="lang-dropdown">
                <button class="dropdown-trigger" onclick="toggleDropdown()"><span
                        id="current-lang-text">TR</span></button>
                <div class="dropdown-menu">
                    <button onclick="setLanguage('tr')">Türkçe</button>
                    <button onclick="setLanguage('en')">English</button>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section id="portal" class="portal-container" style="padding-top: 6rem;">
            <header class="portal-hero">
                <h1 style="font-size: clamp(2.5rem, 8vw, 4rem);">Bölüşmek Hiç Bu Kadar <span
                        class="highlight">Akıllı</span> Olmamıştı.</h1>
                <p>Türkiye'nin en hızlı hesap bölüşme platformu.</p>
            </header>

            <div class="portal-grid">
                <a href="/market" class="portal-card" id="market-card">
                    <span class="portal-badge">Popüler</span>
                    <div class="icon">🛒</div>
                    <h2>Market Modülü</h2>
                    <p>Ürünleri ekleyin ve çarkı çevirerek kimin ödeyeceğine karar verin.</p>
                </a>
                <a href="/yemek" class="portal-card" id="yemek-card">
                    <span class="portal-badge">Yeni</span>
                    <div class="icon">🍽️</div>
                    <h2>Yemek & Restoran</h2>
                    <p>QR okutun ve adisyona ulaşın.</p>
                </a>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
    <script>
        // Senin orijinal scriptindeki tüm animasyon ve scroll kodları
        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('navbar');
            if (window.scrollY > 50) navbar.classList.add('scrolled');
            else navbar.classList.remove('scrolled');
        });

        // Portal kartları giriş animasyonu
        document.querySelectorAll('.portal-card').forEach((card, index) => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            setTimeout(() => {
                card.style.transition = 'all 0.6s ease';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 200 + (index * 150));
        });
    </script>
</body>

</html>
